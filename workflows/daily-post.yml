name: FaceForm Daily Post

on:
  workflow_dispatch:
  schedule:
    - cron: "17 12 * * *"
      timezone: "Europe/Moscow"

permissions:
  contents: write

concurrency:
  group: faceform-daily-post
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish one post
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          FACEFORM_BOT_URL: ${{ secrets.FACEFORM_BOT_URL }}
          CHANNEL_USERNAME: ${{ secrets.CHANNEL_USERNAME }}
          CHANNEL_NAME: "FaceForm | Разбор внешности"
          STATE_FILE: data/content-bot-state.json
          DRY_RUN: "false"
          SAMPLE_MODE: "false"
          DISABLE_CARD: "false"
          ALLOW_EVERGREEN_FALLBACK: "true"
        run: npm start

      - name: Save publication history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/content-bot-state.json
          if git diff --cached --quiet; then
            echo "История не изменилась"
          else
            git commit -m "chore: update content history [skip ci]"
            git push
          fi
